<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="widht=device-widht, inicial-scale=1.0">
    <title>Organizador de Contas</title>

<style>
  body {
    font-family: Arial, sans-serif;
    background: #f5f5f7;
    margin: 0;
    padding: 20px;
  }

  .container {
    max widht: 900px;
    margin: auto;
    background: white;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
  }

  h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    .categoria{
      margin-bottom: 25px;
    }

    .categoria h2 {
      margin-bottom: 10px;
    }

    .item {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
    }

    input, select {
      padding: 8px
      border-radius: 6px
      border: 1px solid #ccc;
  }

  input[type="number"] {
    widht: 120px;
  }

  .total {
    font-weight: bold;
    margin-top: 20px;
    font-size: 18px;
    text-align: right;
  }

  button {
    padding: 8px 12px;
    border: none;
    background: black;
    color: white;
    border-radius: 6px;
    cursor: pointer;
  }

  button:hover {
    opacity: 0.8;
  }
</style>
  </head>

  <body>

    <div class="container">
      <h1>Organizador de Contas</h1>

      <div id="categorias"></div>

      <div class="total">
        Total: R$ <span id="total">0,00</span>
      </div>
    </div>

    <script>
      const categorias = ["Lazer", "Alimentação", "Aluguel", "Mercado", "Faturas"];

      const container =
        document.getElementById("categorias");

      categorias.forEach(cat=> {
        const div = document.createElement("div");
        div.className = "categoria";

        div.innerHTML = `
          <h2>${cat}</h2>
          <div class="itens"></div>
          <button onclick="adicionarItem(this)">Adicionar</button>`;

      container.appendChild(div);
      });

      function adicionarItem(botao) {
        const itensDiv = botao.parentElement.querySelector(".itens");

        const item = document.createElement("div");
        item.className = "item";

        item.innerHTML = `
          <input type="text" placeholder="Descrição">
          <input type="number" placeholder="Valor" oninput="calcularTotal()">
          <select>
             <option>Eventual</option>
             <option>Mensal</option>
             <option>Vitalício</option>
          </select>
        `;

        itensDiv.appendChild(item);
      }

      function calcularTotal() {
        const valores = document.querySelectorAll("input[type='number']");
        let total = 0;

        valores.forEach(input => {
          total += parseFloat(input.value) || 0;
        });

        document.getElementById("total").innerText = total.toFixed(2);
      }

    </script>
  </body>
</html>
