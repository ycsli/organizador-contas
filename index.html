<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Organizador de contas</title>

<style>
:root {
  --bg: #f5f5f7;
  --card: rgba(255,255,255,0.7);
  --text: #111;
}

.dark {
  --bg: #0e0e10;
  --card: rgba(30,30,30,0.6);
  --text: #fff;
}

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont;
  background: var(--bg);
  color: var(--text);
  transition: 0.3s;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

.top {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

h1 {
  font-weight: 600;
}

button {
  border: none;
  padding: 10px;
  border-radius: 10px;
  cursor: pointer;
  background: black;
  color: white;
}

.card {
  background: var(--card);
  backdrop-filter: blur(20px);
  padding: 15px;
  border-radius: 16px;
  margin-top: 20px;
  transition: 0.2s;
}

.card:hover {
  transform: translateY(-3px);
}

.item {
  display: flex;
  gap: 10px;
  margin-top: 10px;
  animation: fade 0.3s;
}

input, select {
  padding: 10px;
  border-radius: 10px;
  border: none;
  flex: 1;
}

.total {
  font-size: 22px;
  text-align: right;
  margin-top: 20px;
  font-weight: 600;
}

.delete {
  background: red;
}

@keyframes fade {
  from {opacity:0; transform:translateY(5px);}
  to {opacity:1;}
}
</style>
</head>

<body>

<div class="container">

<div class="top">
<h1>Organizador de contas</h1>
<button onclick="toggleDark()">Modo</button>
</div>

<div id="app"></div>

<div class="total">
Total: R$ <span id="total">0.00</span>
</div>

</div>

<script>
const categorias = ["Lazer","Alimentação","Aluguel","Mercado","Fatura"];
let dados = JSON.parse(localStorage.getItem("dados")) || {};

function salvar(){
  localStorage.setItem("dados", JSON.stringify(dados));
}

function render(){
  const app = document.getElementById("app");
  app.innerHTML = "";

  categorias.forEach(cat=>{
    if(!dados[cat]) dados[cat]=[];

    let totalCat = dados[cat].reduce((s,i)=>s+(parseFloat(i.valor)||0),0);

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <h2>${cat} — R$ ${totalCat.toFixed(2)}</h2>
      ${dados[cat].map((item,i)=>`
        <div class="item">
          <input placeholder="Descrição" value="${item.desc}" 
            onchange="update('${cat}',${i},'desc',this.value)">
          
          <input type="number" placeholder="Valor" value="${item.valor}" 
            onchange="update('${cat}',${i},'valor',this.value)">
          
          <select onchange="update('${cat}',${i},'tipo',this.value)">
            <option ${item.tipo==="Eventual"?"selected":""}>Eventual</option>
            <option ${item.tipo==="Mensal"?"selected":""}>Mensal</option>
            <option ${item.tipo==="Vitalício"?"selected":""}>Vitalício</option>
          </select>

          <button class="delete" onclick="removeItem('${cat}',${i})">X</button>
        </div>
      `).join("")}

      <button onclick="addItem('${cat}')">Adicionar</button>
    `;

    app.appendChild(card);
  });

  calcularTotal();
  salvar();
}

function addItem(cat){
  dados[cat].push({desc:"",valor:"",tipo:"Eventual"});
  render();
}

function update(cat,i,campo,valor){
  dados[cat][i][campo]=valor;
  calcularTotal();
  salvar();
}

function removeItem(cat,i){
  dados[cat].splice(i,1);
  render();
}

function calcularTotal(){
  let total=0;
  Object.values(dados).forEach(lista=>{
    lista.forEach(i=>{
      total += parseFloat(i.valor)||0;
    });
  });
  document.getElementById("total").innerText = total.toFixed(2);
}

function toggleDark(){
  document.body.classList.toggle("dark");
  localStorage.setItem("dark", document.body.classList.contains("dark"));
}

if(localStorage.getItem("dark")==="true"){
  document.body.classList.add("dark");
}

render();
</script>

</body>
</html>
